<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCTI — Hackathon Type Indicator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   HCTI — Cyberpunk Dark Theme Design System
   Style: Cyberpunk UI / Tech Noir
   Fonts: JetBrains Mono (heading) + IBM Plex Sans (body)
   Colors: #0a0a0f bg, #00ff41 neon green, #00d4ff cyan
   Dim Group Colors: H绿 C橙 E紫 T蓝 P红
   ================================================================ */

/* ----- RESET & BASE ----- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: 'IBM Plex Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #0a0a0f;
  color: #e0e0e0;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ----- SCANLINE OVERLAY ----- */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
  );
  opacity: 0.3;
}

/* ----- BG GRID + GLOW ----- */
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(0,255,65,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,65,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
}
.bg-glow-1 {
  position: fixed; z-index: 0; pointer-events: none;
  width: 600px; height: 600px; border-radius: 50%;
  filter: blur(200px); opacity: 0.10;
  top: -250px; left: 50%; transform: translateX(-50%);
  background: radial-gradient(circle, #00ff41 0%, transparent 70%);
}
.bg-glow-2 {
  position: fixed; z-index: 0; pointer-events: none;
  width: 400px; height: 400px; border-radius: 50%;
  filter: blur(160px); opacity: 0.08;
  bottom: -150px; right: -100px;
  background: radial-gradient(circle, #00d4ff 0%, transparent 70%);
}

/* ----- APP CONTAINER ----- */
.app-container {
  position: relative; z-index: 1;
  max-width: 680px; margin: 0 auto; padding: 24px 20px 60px;
  min-height: 100vh;
  display: flex; flex-direction: column; justify-content: center;
}

/* ----- PAGE TRANSITIONS ----- */
.page { display: none; animation: pageIn 0.35s ease; }
.page.active { display: block; }
@keyframes pageIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ----- TYPOGRAPHY ----- */
h1, h2, h3, .mono {
  font-family: 'JetBrains Mono', 'PingFang SC', 'Microsoft YaHei', monospace;
}
.neon-text {
  text-shadow:
    0 0 7px  rgba(0,255,65,0.5),
    0 0 20px rgba(0,255,65,0.2),
    0 0 40px rgba(0,255,65,0.08);
}

/* ================================================================
   START PAGE
   ================================================================ */
.start-logo { text-align: center; margin-bottom: 32px; }
.start-logo .logo-icon {
  display: block; margin: 0 auto 12px; width: 64px; height: 64px;
}
.start-logo .logo-icon svg { width: 100%; height: 100%; }
.start-logo h1 {
  font-size: 2.6rem; font-weight: 900; letter-spacing: 6px;
  background: linear-gradient(135deg, #00ff41 20%, #00d4ff 80%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; text-shadow: none;
}
.start-logo .tagline {
  font-size: 0.9rem; color: #555; margin-top: 6px; letter-spacing: 3px;
}
.start-logo .sub-info {
  font-size: 0.78rem; color: #444; margin-top: 4px; letter-spacing: 1px;
}

.intro-card {
  background: #111118; border: 1px solid #1f1f2e; border-radius: 16px;
  padding: 24px 22px; margin-bottom: 28px;
}
.intro-card h3 {
  color: #00ff41; font-size: 1rem; font-weight: 600;
  margin-bottom: 10px; letter-spacing: 1px;
}
.intro-card p {
  color: #999; font-size: 0.88rem; line-height: 1.7;
}
.dim-tags {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px;
}
.dim-tags span {
  font-family: 'JetBrains Mono', monospace;
  padding: 5px 14px; border-radius: 20px;
  font-size: 0.78rem; font-weight: 600; letter-spacing: 1px;
}
.dim-tags .dt-h { background: #0a1a10; color: #00ff41; border: 1px solid #0d3a10; }
.dim-tags .dt-c { background: #1a1008; color: #ff8c00; border: 1px solid #3a2008; }
.dim-tags .dt-e { background: #10081a; color: #9b59b6; border: 1px solid #20103a; }
.dim-tags .dt-t { background: #08101a; color: #3498db; border: 1px solid #10203a; }
.dim-tags .dt-p { background: #1a0808; color: #e74c3c; border: 1px solid #3a1010; }

.btn-start {
  display: block; width: 100%; padding: 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.1rem; font-weight: 700; letter-spacing: 3px;
  border: none; border-radius: 12px; cursor: pointer;
  background: linear-gradient(135deg, #00ff41, #00b32d);
  color: #0a0a0f;
  box-shadow: 0 0 40px rgba(0,255,65,0.18);
  transition: all 0.25s ease;
}
.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 60px rgba(0,255,65,0.30);
}
.btn-start:active { transform: scale(0.98); }

/* ================================================================
   PROGRESS BAR
   ================================================================ */
.progress-wrap { margin-bottom: 24px; }
.progress-info {
  display: flex; justify-content: space-between; margin-bottom: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; color: #666;
}
.progress-track {
  height: 4px; background: #1a1a28; border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, #00ff41, #00d4ff);
  transition: width 0.35s ease;
  box-shadow: 0 0 8px rgba(0,255,65,0.3);
}

/* ================================================================
   QUESTION PAGE
   ================================================================ */
.q-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem; color: #00ff41; margin-bottom: 8px; letter-spacing: 1px;
}
.q-dim-badge {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: #00d4ff;
  background: #0d1a20; border: 1px solid #1a3a40;
  padding: 3px 10px; border-radius: 10px;
  margin-bottom: 14px; letter-spacing: 1px;
}
.q-text {
  font-size: 1.2rem; font-weight: 600; line-height: 1.65; margin-bottom: 24px;
  color: #e8e8e8;
}

.options-list { display: flex; flex-direction: column; gap: 10px; }
.opt-btn {
  display: flex; align-items: center; gap: 12px;
  width: 100%; padding: 15px 16px; text-align: left;
  background: #111118; border: 2px solid #1c1c2a; border-radius: 12px;
  cursor: pointer; color: #bbb; font-size: 0.92rem;
  transition: all 0.2s ease;
  font-family: inherit;
}
.opt-btn:hover {
  border-color: rgba(0,212,255,0.3);
  background: #151522;
}
.opt-btn.selected {
  border-color: #00ff41;
  background: #0a1a10;
  box-shadow: 0 0 18px rgba(0,255,65,0.08);
}
.opt-btn .opt-letter {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
  background: #1c1c2a; color: #777;
  transition: all 0.2s ease;
}
.opt-btn.selected .opt-letter {
  background: #00ff41; color: #0a0a0f;
  box-shadow: 0 0 10px rgba(0,255,65,0.3);
}
.opt-btn .opt-level {
  margin-left: auto; font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: #555; padding: 2px 10px;
  border-radius: 10px; background: #1a1a28;
}
.opt-btn.selected .opt-level {
  color: #00ff41; background: #0d1a10;
}

.q-nav { display: flex; gap: 12px; margin-top: 24px; }
.btn-nav {
  flex: 1; padding: 13px; font-size: 0.9rem; font-weight: 600;
  border: none; border-radius: 12px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 1px;
  transition: all 0.2s ease;
}
.btn-prev { background: #1a1a28; color: #888; }
.btn-prev:hover { background: #222240; color: #aaa; }
.btn-next {
  background: linear-gradient(135deg, #00ff41, #00b32d);
  color: #0a0a0f;
}
.btn-next:hover:not(:disabled) {
  box-shadow: 0 0 28px rgba(0,255,65,0.22);
}
.btn-next:disabled { opacity: 0.25; cursor: not-allowed; box-shadow: none; }

/* ================================================================
   LOADING PAGE
   ================================================================ */
.loading-wrap { text-align: center; padding: 60px 0; }
.loading-ring {
  width: 44px; height: 44px; margin: 0 auto 20px;
  border: 3px solid #1c1c2a;
  border-top-color: #00ff41; border-right-color: #00d4ff;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: 'JetBrains Mono', monospace;
  color: #00ff41; font-size: 1rem;
  letter-spacing: 2px;
  animation: pulse-text 1.5s ease-in-out infinite;
}
@keyframes pulse-text { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ================================================================
   RESULT PAGE — HEADER
   ================================================================ */
.result-header { text-align: center; margin-bottom: 24px; }
.result-badge {
  display: inline-block; padding: 6px 20px; border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; font-weight: 700; letter-spacing: 3px;
  background: linear-gradient(135deg, #00ff41, #00d4ff);
  color: #0a0a0f; margin-bottom: 10px;
}
.result-type {
  font-size: 2.2rem; font-weight: 900; letter-spacing: 4px;
  background: linear-gradient(135deg, #00ff41 30%, #00d4ff 70%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; text-shadow: none;
}
.result-tagline { color: #00d4ff; font-size: 0.9rem; margin-top: 4px; }
.result-match {
  font-family: 'JetBrains Mono', monospace;
  color: #00ff41; font-size: 1.3rem; font-weight: 700; margin-top: 6px;
}

/* ----- RESULT DESCRIPTION ----- */
.result-desc {
  background: #111118; border: 1px solid #1f1f2e; border-radius: 14px;
  padding: 18px 20px; margin-bottom: 14px;
}
.result-desc p { color: #bbb; font-size: 0.9rem; line-height: 1.7; }

/* ----- TEAM FIT / AVOID / WEAKNESS ----- */
.info-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;
}
.info-card {
  background: #111118; border: 1px solid #1f1f2e; border-radius: 12px;
  padding: 14px 16px;
}
.info-card.full-width { grid-column: 1 / -1; }
.info-card h4 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; letter-spacing: 1px; margin-bottom: 8px;
}
.info-card h4.fit  { color: #00ff41; }
.info-card h4.avoid { color: #ff6b6b; }
.info-card h4.grow  { color: #ffd93d; }
.info-card .tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  font-size: 0.78rem; padding: 4px 12px; border-radius: 16px;
  border: 1px solid #2a2a3a; background: #1a1a28; color: #ccc;
}
.tag.fit  { border-color: rgba(0,255,65,0.25);  color: #00ff41; background: #0a1a10; }
.tag.avoid { border-color: rgba(255,107,107,0.25); color: #ff6b6b; background: #1a1010; }
.tag.grow  { border-color: rgba(255,217,61,0.25);  color: #ffd93d; background: #1a1808; }
.tag.rec   { border-color: rgba(0,212,255,0.25);   color: #00d4ff; background: #08101a; }
.info-card .desc-text {
  font-size: 0.82rem; color: #999; line-height: 1.55; margin-top: 4px;
}

/* ----- CANVAS RADAR CHART ----- */
.radar-wrap {
  text-align: center; margin-bottom: 18px;
  background: #111118; border: 1px solid #1f1f2e; border-radius: 14px;
  padding: 18px 10px 10px;
}
.radar-wrap h3 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.95rem; color: #00d4ff; margin-bottom: 8px; letter-spacing: 1px;
}
canvas#radar-canvas {
  max-width: 100%; height: auto;
}

/* ----- DIMENSION BARS ----- */
.dim-section { margin-bottom: 18px; }
.dim-section h3 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.95rem; color: #00d4ff; margin-bottom: 12px; letter-spacing: 1px;
}
.dim-group { margin-bottom: 14px; }
.dim-group-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; margin-bottom: 6px; letter-spacing: 2px;
  padding: 2px 10px; border-radius: 6px; display: inline-block;
}
.dim-group-label.dg-h { color: #00ff41; background: #0a1a10; }
.dim-group-label.dg-c { color: #ff8c00; background: #1a1008; }
.dim-group-label.dg-e { color: #9b59b6; background: #10081a; }
.dim-group-label.dg-t { color: #3498db; background: #08101a; }
.dim-group-label.dg-p { color: #e74c3c; background: #1a0808; }
.dim-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 5px;
}
.dim-row .dim-name {
  width: 30px; font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem; color: #aaa; flex-shrink: 0;
}
.dim-row .dim-bar-wrap {
  flex: 1; height: 7px; background: #1a1a28; border-radius: 4px; overflow: hidden;
}
.dim-row .dim-bar-fill {
  height: 100%; border-radius: 4px; transition: width 0.7s ease;
}
.dim-row .dim-val {
  width: 24px; font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; font-weight: 700; text-align: right;
}
/* group-specific bar colors */
.dg-h-fill { background: #00ff41; box-shadow: 0 0 8px rgba(0,255,65,0.4); }
.dg-c-fill { background: #ff8c00; box-shadow: 0 0 8px rgba(255,140,0,0.4); }
.dg-e-fill { background: #9b59b6; box-shadow: 0 0 8px rgba(155,89,182,0.4); }
.dg-t-fill { background: #3498db; box-shadow: 0 0 8px rgba(52,152,219,0.4); }
.dg-p-fill { background: #e74c3c; box-shadow: 0 0 8px rgba(231,76,60,0.4); }

/* ----- TOP MATCHES ----- */
.matches-section { margin-bottom: 18px; }
.matches-section h3 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.95rem; color: #00ff41; margin-bottom: 10px; letter-spacing: 1px;
}
.match-card {
  background: #111118; border: 1px solid #1f1f2e; border-radius: 12px;
  padding: 14px 16px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
  transition: border-color 0.25s;
}
.match-card.top1 { border-color: rgba(0,255,65,0.35); }
.match-rank {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.2rem; font-weight: 900; width: 32px; text-align: center; color: #555;
}
.match-card.top1 .match-rank { color: #00ff41; }
.match-card.top2 .match-rank { color: #00d4ff; }
.match-card.top3 .match-rank { color: #ffd93d; }
.match-info { flex: 1; }
.match-name { font-weight: 700; font-size: 1rem; }
.match-tagline { font-size: 0.8rem; color: #888; margin-top: 2px; }
.match-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.1rem; font-weight: 700; color: #00ff41;
}

/* ----- SHARE SECTION ----- */
.share-section {
  background: #111118; border: 1px solid #1f1f2e; border-radius: 14px;
  padding: 18px; margin-bottom: 14px;
}
.share-section h3 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.9rem; color: #00d4ff; margin-bottom: 10px; letter-spacing: 1px;
}
.share-box {
  background: #0a0a0f; border: 1px solid #1c1c2a; border-radius: 10px;
  padding: 14px; font-size: 0.85rem; color: #bbb; line-height: 1.6;
  margin-bottom: 10px; position: relative; white-space: pre-wrap; word-break: break-all;
}
.btn-copy {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 20px; font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem; font-weight: 600; letter-spacing: 1px;
  border: 2px solid #1f1f2e; border-radius: 10px; cursor: pointer;
  background: transparent; color: #00ff41;
  transition: all 0.2s ease;
}
.btn-copy:hover { border-color: #00ff4166; background: #0a1a10; }
.btn-copy.copied { border-color: #00ff41; background: #0a1a10; color: #00ff41; }

/* ----- BOTTOM LINKS ----- */
.bottom-links {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;
}
.bottom-link {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 13px; font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem; font-weight: 600; letter-spacing: 1px;
  border: 1px solid #1f1f2e; border-radius: 12px; cursor: pointer;
  background: #111118; color: #888;
  transition: all 0.2s ease; text-decoration: none;
}
.bottom-link:hover { border-color: #2a2a3a; color: #ccc; }
.bottom-link svg { width: 18px; height: 18px; flex-shrink: 0; }

.btn-restart {
  display: block; width: 100%; padding: 15px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.95rem; font-weight: 600; letter-spacing: 1px;
  border: 2px solid #1f1f2e; border-radius: 12px; cursor: pointer;
  background: transparent; color: #00ff41;
  transition: all 0.2s ease; margin-top: 6px;
}
.btn-restart:hover { border-color: #00ff4166; background: #0a1a10; }
.btn-cta {
  display: block; width: 100%; padding: 15px; margin-top: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.95rem; font-weight: 700; letter-spacing: 1px;
  border: none; border-radius: 12px; cursor: pointer;
  background: linear-gradient(135deg, #00d4ff, #0088aa);
  color: #0a0a0f; transition: all 0.2s ease;
}
.btn-cta:hover { box-shadow: 0 0 30px rgba(0,212,255,0.25); }
.btn-cta:active { transform: scale(0.98); }

/* ----- FOOTER ----- */
.app-footer {
  text-align: center; padding: 20px 0 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: #333; letter-spacing: 2px;
}

/* ================================================================
   RESPONSIVE
   ================================================================ */
@media (max-width: 480px) {
  .app-container { padding: 20px 14px 50px; }
  .start-logo h1 { font-size: 2rem; letter-spacing: 4px; }
  .result-type { font-size: 1.7rem; letter-spacing: 2px; }
  .q-text { font-size: 1.05rem; }
  .opt-btn { padding: 13px 14px; font-size: 0.88rem; }
  .info-row { grid-template-columns: 1fr; }
  .bottom-links { grid-template-columns: 1fr; }
  canvas#radar-canvas { width: 100% !important; height: auto !important; }
}

/* ================================================================
   REDUCED MOTION
   ================================================================ */
@media (prefers-reduced-motion: reduce) {
  .page { animation: none; }
  .loading-ring { animation: none; border-top-color: #00ff41; }
  .loading-text { animation: none; }
  .dim-bar-fill { transition: none; }
}

/* ================================================================
   PULSE REVEAL CANVAS
   ================================================================ */
#pulse-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ================================================================
   REVEAL ANIMATION
   ================================================================ */
.reveal-text, .reveal-btn {
  opacity: 0; transform: translateY(12px);
  transition: opacity 0.8s ease 500ms, transform 0.8s ease 500ms;
}
.reveal-text.show, .reveal-btn.show {
  opacity: 1; transform: translateY(0);
}
.glitch-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: #0a0a0f; pointer-events: none;
  opacity: 0; transition: opacity 0.1s;
}
.glitch-overlay.fire {
  animation: glitch-slam 0.5s ease-out forwards;
}
@keyframes glitch-slam {
  0%   { opacity: 1; background: #00ff41; clip-path: inset(0 0 95% 0); }
  5%   { opacity: 1; background: #00d4ff; clip-path: inset(0 0 0 0); }
  10%  { opacity: 1; background: #0a0a0f; clip-path: inset(70% 0 0 0); }
  15%  { opacity: 1; background: #ff006e; clip-path: inset(20% 0 60% 0); }
  20%  { opacity: 1; background: #0a0a0f; clip-path: inset(0 80% 0 0); }
  25%  { opacity: 1; background: #00ff41; clip-path: inset(10% 0 80% 0); }
  30%  { opacity: 1; background: #0a0a0f; clip-path: inset(0 0 0 60%); }
  40%  { opacity: 1; background: #00d4ff; clip-path: inset(50% 0 40% 0); }
  55%  { opacity: 0.8; background: #0a0a0f; clip-path: inset(0 0 0 0); }
  70%  { opacity: 0.4; background: #00ff41; clip-path: inset(0 0 30% 0); }
  100% { opacity: 0; clip-path: inset(0 0 0 0); }
}
.term-prompt { color: #00d4ff; }
.term-dim   { color: #444; }
.term-success { color: #00ff41; text-shadow: 0 0 6px rgba(0,255,65,0.4); }
.term-cursor { color: #00ff41; animation: blink-cursor 1s step-end infinite; }
@keyframes blink-cursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* ================================================================
   GLITCH EFFECT
   ================================================================ */
.glitch {
  position: relative; display: inline-block;
}
.glitch::before,
.glitch::after {
  content: attr(data-text);
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #00ff41 20%, #00d4ff 80%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0;
}
.glitch::before {
  animation: glitch-r 4s infinite;
}
.glitch::after {
  animation: glitch-b 4s infinite;
}
@keyframes glitch-r {
  0%, 94%, 96%, 98%, 100% { opacity: 0; transform: translate(0); }
  95% { opacity: 0.6; transform: translate(-2px, 1px); }
  97% { opacity: 0.4; transform: translate(2px, -1px); }
}
@keyframes glitch-b {
  0%, 93%, 95%, 97%, 100% { opacity: 0; transform: translate(0); }
  94% { opacity: 0.5; transform: translate(3px, -1px); }
  96% { opacity: 0.3; transform: translate(-2px, 1px); }
}
</style>

  desc:'15维度全H极值！能带队、能开发、能创意、能答辩、心态无敌，一人扛起全队，可独立完成完整竞赛项目的六边形全能选手。',
  fit:['任何位置','全局统筹','终极兜底'], avoid:'避免一人包揽所有事——把能力转化为"教队友做"而不是"替队友做"',
  weakness:'你的天花板就是团队的天花板。多花时间带新人，把个人能力转化为团队能力才是真正的全能。',
  recs:['ANY','ANY','ANY']
};


/* ================================================================
   FRAMEWORK LOGIC
   ================================================================ */

// ---- State ----
let currentQ = 0;
let answers = {};
let showQ32 = false;
let lastShareText = '';

// ---- Page Navigation ----
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('page-' + name);
  if (el) el.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ---- Start ----
function startTest() {
  // Fire glitch transition
  const overlay = document.getElementById('glitch-overlay');
  if (overlay) {
    overlay.classList.remove('fire');
    void overlay.offsetWidth;
    overlay.classList.add('fire');
  }
  setTimeout(() => {
    currentQ = 0; answers = {}; showQ32 = false;
    showPage('question');
    renderQuestion();
  }, 400);
}

// ---- Render Question ----
function renderQuestion() {
  const total = showQ32 ? 32 : 31;
  const q = QUESTIONS[currentQ];

  document.getElementById('progress-fill').style.width = ((currentQ / total) * 100) + '%';
  document.getElementById('q-counter').textContent = `第 ${currentQ + 1} / ${total} 题`;

  const flowLabel = document.getElementById('q-flow-label');
  if (q.isBranch)      { flowLabel.textContent = '分支题'; flowLabel.style.color = '#ffd93d'; }
  else if (q.isHidden) { flowLabel.textContent = '隐藏题'; flowLabel.style.color = '#ff6b6b'; }
  else                 { flowLabel.textContent = '计分题'; flowLabel.style.color = '#00d4ff'; }

  document.getElementById('q-num').textContent = 'Q' + q.id;
  document.getElementById('q-dims').textContent = q.dimLabel;
  document.getElementById('q-text').textContent = q.text;

  const container = document.getElementById('options-list');
  container.innerHTML = '';
  const labels = ['A', 'B', 'C'];
  const levels = ['L', 'M', 'H'];
  const sel = answers[currentQ];

  q.opts.forEach((optText, i) => {
    const val = OPTION_VALUES[i];
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (sel === val ? ' selected' : '');
    btn.setAttribute('role', 'radio');
    btn.setAttribute('aria-checked', sel === val ? 'true' : 'false');
    btn.innerHTML = `<span class="opt-letter">${labels[i]}</span><span>${optText}</span><span class="opt-level">${levels[i]}</span>`;
    btn.addEventListener('click', () => {
      answers[currentQ] = val;
      document.getElementById('btn-next').disabled = false;
      renderQuestion();
    });
    container.appendChild(btn);
  });

  document.getElementById('btn-prev').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = currentQ === total - 1 ? '提交 →' : '下一题 →';
  btnNext.disabled = sel == null;
}

// ---- Navigation ----
function nextQuestion() {
  if (answers[currentQ] == null) return;
  if (currentQ === 30 && !showQ32 && answers[30] === 3) { showQ32 = true; }
  const total = showQ32 ? 32 : 31;
  if (currentQ < total - 1) { currentQ++; renderQuestion(); }
  else { calculate(); }
}
function prevQuestion() { if (currentQ > 0) { currentQ--; renderQuestion(); } }

// ---- Calculate ----
function calculate() {
  showPage('loading');

  // Aggregate per-dimension
  const dimScores = DIMS.map(() => ({ sum:0, count:0 }));
  QUESTIONS.forEach((q, qi) => {
    const val = answers[qi];
    if (val == null || q.isBranch) return;
    q.dims.forEach(di => { dimScores[di].sum += val; dimScores[di].count += 1; });
  });
  const rawVec = dimScores.map(ds => ds.count > 0 ? ds.sum / ds.count : 2);

  // Z-score
  const mean = rawVec.reduce((a,b)=>a+b,0)/15;
  const std = Math.sqrt(rawVec.reduce((s,v)=>s+(v-mean)**2,0)/15)||1;
  const normalized = rawVec.map(v => Math.max(0,Math.min(100, 50+(v-mean)/std*15)));
  const toLevel = s => s<33?1:s<66?2:3;
  const userLevels = normalized.map(toLevel);

  // GOD / NOOB
  const allHigh = userLevels.every(v=>v===3);
  const allLowNoH = userLevels.every(v=>v<=2) && !userLevels.some(v=>v===3);

  // Manhattan distance
  const scored = TEMPLATES.map(t => {
    const dist = t.vec.reduce((s,tv,i)=>s+Math.abs(userLevels[i]-tv), 0);
    return { ...t, dist, pct: Math.max(0,Math.round((1-dist/30)*100)) };
  });
  scored.sort((a,b)=>b.pct-a.pct||a.dist-b.dist);

  let primary, badge, top3;
  if (allHigh) {
    primary = { ...HIDDEN_GOD, pct:100, dist:0 };
    badge = 'HIDDEN · 隐藏人格';
    top3 = [primary, ...scored.slice(0,2)];
  } else if (allLowNoH) {
    primary = { ...HIDDEN_NOOB, pct:100, dist:0 };
    badge = 'HIDDEN · 隐藏人格';
    top3 = [primary, ...scored.slice(0,2)];
  } else {
    primary = scored[0];
    badge = primary.pct >= 80 ? 'TOP MATCH' : 'NEAR MATCH';
    top3 = scored.slice(0,3);
  }

  setTimeout(() => {
    document.getElementById('result-badge').textContent = badge;
    document.getElementById('result-type').textContent = primary.name;
    document.getElementById('result-tagline').textContent = primary.tagline;
    document.getElementById('result-match').textContent = `匹配度 ${primary.pct}%`;
    document.getElementById('result-desc').textContent = primary.desc;

    // Team cards
    document.getElementById('team-fit').innerHTML =
      (primary.fit||[]).map(f=>`<span class="tag fit">${f}</span>`).join('');
    document.getElementById('team-avoid').textContent = primary.avoid||'';
    document.getElementById('team-recs').innerHTML =
      (primary.recs||[]).map(r=>`<span class="tag rec">${r}</span>`).join('');
    document.getElementById('team-weakness').textContent = primary.weakness||'';

    // Bars + matches (radar drawn after page visible below)
    renderDimBars(userLevels, normalized);
    renderMatches(top3);

    // Share text
    const shareLabel = primary.name.split(' ')[0] || primary.name;
    lastShareText =
      `【HCTI黑客松人格测试】\n` +
      `我的人格类型是：${primary.name}\n` +
      `匹配度：${primary.pct}%\n` +
      `一句话：${primary.tagline}\n` +
      `\n` +
      `最适合分工：${(primary.fit||[]).join('、')}\n` +
      `推荐队友：${(primary.recs||[]).join('、')}\n` +
      `\n` +
      `测测你在黑客松中是什么人格 → [链接占位]\n` +
      `#HCTI #黑客松人格测试`;
    document.getElementById('share-text').textContent = lastShareText;
    document.getElementById('btn-copy').classList.remove('copied');
    document.getElementById('btn-copy').innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      一键复制文案`;

    showPage('result');
    // Draw radar after canvas is visible
    setTimeout(() => drawRadar(normalized), 100);
  }, 1600);
}

// ---- Canvas Radar Chart (5-axis pentagon) ----
function drawRadar(scores) {
  const canvas = document.getElementById('radar-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const r = 150;
  const n = 5;

  ctx.clearRect(0, 0, W, H);

  // Grid rings
  for (let ring = 1; ring <= 3; ring++) {
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const angle = -Math.PI/2 + (2*Math.PI*i)/n;
      const rr = r * ring/3;
      const x = cx + rr * Math.cos(angle);
      const y = cy + rr * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = ring === 3 ? '#1f1f2e' : '#151520';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Axes
  for (let i = 0; i < n; i++) {
    const angle = -Math.PI/2 + (2*Math.PI*i)/n;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    ctx.strokeStyle = '#1a1a28';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Data pentagon
  const groupAvgs = DIM_GROUPS.map(g => {
    const avg = g.dims.reduce((s, di) => s + scores[di], 0) / 3;
    return avg / 100; // 0-1
  });

  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const angle = -Math.PI/2 + (2*Math.PI*i)/n;
    const rr = r * groupAvgs[i];
    const x = cx + rr * Math.cos(angle);
    const y = cy + rr * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,255,65,0.1)';
  ctx.fill();
  ctx.strokeStyle = '#00ff41';
  ctx.lineWidth = 2;
  ctx.shadowColor = 'rgba(0,255,65,0.5)';
  ctx.shadowBlur = 10;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Data points
  for (let i = 0; i < n; i++) {
    const angle = -Math.PI/2 + (2*Math.PI*i)/n;
    const rr = r * groupAvgs[i];
    ctx.beginPath();
    ctx.arc(cx + rr * Math.cos(angle), cy + rr * Math.sin(angle), 5, 0, Math.PI*2);
    ctx.fillStyle = DIM_GROUPS[i].color;
    ctx.fill();
    ctx.strokeStyle = '#0a0a0f';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Labels
  ctx.font = '600 13px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < n; i++) {
    const angle = -Math.PI/2 + (2*Math.PI*i)/n;
    const lr = r + 32;
    const x = cx + lr * Math.cos(angle);
    const y = cy + lr * Math.sin(angle);
    ctx.fillStyle = DIM_GROUPS[i].color;
    // Score label
    const scorePct = Math.round(groupAvgs[i] * 100);
    ctx.fillText(DIM_GROUPS[i].label + ' ' + scorePct, x, y);
  }
}

// ---- Dimension Bars ----
function renderDimBars(levels, scores) {
  let html = '';
  DIM_GROUPS.forEach(g => {
    html += `<div class="dim-group"><div class="dim-group-label ${g.css}">${g.label}</div>`;
    g.dims.forEach(i => {
      const ltr = LEVEL_LABELS[levels[i]];
      html +=
        `<div class="dim-row">
          <span class="dim-name">${DIMS[i]}</span>
          <div class="dim-bar-wrap">
            <div class="dim-bar-fill ${g.fillCss}" style="width:${scores[i]}%"></div>
          </div>
          <span class="dim-val" style="color:${g.color}">${ltr}</span>
        </div>`;
    });
    html += '</div>';
  });
  document.getElementById('dim-chart').innerHTML = html;
}

// ---- Top 3 Matches ----
function renderMatches(top3) {
  document.getElementById('matches-list').innerHTML = top3.map((m,i) => `
    <div class="match-card top${i+1}">
      <span class="match-rank">#${i+1}</span>
      <div class="match-info">
        <div class="match-name">${m.name}</div>
        <div class="match-tagline">${m.tagline}</div>
      </div>
      <span class="match-pct">${m.pct}%</span>
    </div>
  `).join('');
}

// ---- Copy Share Text ----
function copyShare() {
  if (!lastShareText) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(lastShareText).then(() => {
      const btn = document.getElementById('btn-copy');
      btn.classList.add('copied');
      btn.innerHTML = `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        已复制！
      `;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          一键复制文案`;
      }, 2000);
    }).catch(() => fallbackCopy(lastShareText));
  } else {
    fallbackCopy(lastShareText);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
  const btn = document.getElementById('btn-copy');
  btn.classList.add('copied');
  btn.textContent = '已复制！';
  setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '一键复制文案'; }, 2000);
}

// ---- Restart ----
function restartTest() {
  currentQ = 0; answers = {}; showQ32 = false; lastShareText = '';
  showPage('start');
}

// ================================================================
//   PULSE REVEAL — heartbeat → ring burst → logo reveal
// ================================================================
(function(){
  const canvas = document.getElementById('pulse-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let w, h, cx, cy;
  let t = 0;
  let phase = 'heartbeat'; // heartbeat | burst | idle
  let burstR = 0;
  let heartbeatCount = 0;
  let beatAlpha = 0;
  let beatR = 0;
  let lastBeatTime = 0;
  const HEARTBEAT_INTERVAL = 700; // ms between beats
  const TOTAL_BEATS = 3;
  const BURST_SPEED = 6;

  function resize() {
    w = canvas.width  = window.innerWidth;
    h = canvas.height = window.innerHeight;
    cx = w / 2;
    cy = h / 2;
  }
  resize();
  window.addEventListener('resize', resize);

  function draw(now) {
    ctx.clearRect(0, 0, w, h);
    const dt = now - (lastBeatTime || now);
    lastBeatTime = now;
    t = now;

    if (phase === 'heartbeat') {
      // Pulsing dot
      const elapsed = t % HEARTBEAT_INTERVAL;
      const progress = elapsed / HEARTBEAT_INTERVAL;

      if (progress < 0.15) {
        // Quick expand
        beatR = 3 + 12 * (progress / 0.15);
        beatAlpha = 0.8 * (progress / 0.15);
      } else if (progress < 0.3) {
        // Quick contract
        beatR = 15 - 12 * ((progress - 0.15) / 0.15);
        beatAlpha = 0.8 * (1 - (progress - 0.15) / 0.15);
      } else {
        // Rest
        beatR = 3;
        beatAlpha = 0.3;
      }

      // Check for beat completion (when progress crosses 0)
      const prevProgress = ((t - dt) % HEARTBEAT_INTERVAL) / HEARTBEAT_INTERVAL;
      if (progress < prevProgress && heartbeatCount < TOTAL_BEATS) {
        heartbeatCount++;
        if (heartbeatCount >= TOTAL_BEATS) {
          phase = 'burst';
          burstR = beatR;
        }
      }

      // Draw heartbeat dot with glow
      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, beatR * 4);
      glow.addColorStop(0, `rgba(0,255,65,${beatAlpha})`);
      glow.addColorStop(0.3, `rgba(0,255,65,${beatAlpha * 0.5})`);
      glow.addColorStop(0.7, `rgba(0,212,255,${beatAlpha * 0.1})`);
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(cx - beatR * 4, cy - beatR * 4, beatR * 8, beatR * 8);

      // Core dot
      ctx.beginPath();
      ctx.arc(cx, cy, beatR * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${beatAlpha})`;
      ctx.fill();

    } else if (phase === 'burst') {
      // Expanding ring
      burstR += BURST_SPEED;
      const maxR = Math.sqrt(w * w + h * h) / 2 + 50;
      const progress = burstR / maxR;
      const alpha = 1 - progress;

      if (alpha <= 0) {
        phase = 'idle';
        revealContent();
        return;
      }

      // Ring
      ctx.beginPath();
      ctx.arc(cx, cy, burstR, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(0,255,65,${alpha})`;
      ctx.lineWidth = 3 + alpha * 8;
      ctx.shadowColor = `rgba(0,255,65,${alpha})`;
      ctx.shadowBlur = 20;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Second inner ring
      ctx.beginPath();
      ctx.arc(cx, cy, burstR * 0.85, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(0,212,255,${alpha * 0.5})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Glow center
      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, burstR * 0.3);
      glow.addColorStop(0, `rgba(255,255,255,${alpha * 0.6})`);
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(cx - burstR * 0.3, cy - burstR * 0.3, burstR * 0.6, burstR * 0.6);
    }

    if (phase !== 'idle') {
      requestAnimationFrame(draw);
    }
  }

  function revealContent() {
    // Reveal text and button
    document.querySelectorAll('.reveal-text, .reveal-btn').forEach(el => {
      el.classList.add('show');
    });
    // Logo glow-in
    const logoIcon = document.getElementById('logo-icon');
    if (logoIcon) {
      logoIcon.style.transition = 'filter 0.8s ease';
      logoIcon.style.filter = 'drop-shadow(0 0 16px rgba(0,255,65,0.5))';
    }
  }

  requestAnimationFrame(draw);
})();
